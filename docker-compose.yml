version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elms_app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=elms_quiz
      - DB_USERNAME=elms_user
      - DB_PASSWORD=elms_password
    networks:
      - elms-network
    command: php artisan serve --host=0.0.0.0

  db:
    image: mysql:8.0
    container_name: elms_db
    environment:
      - MYSQL_DATABASE=elms_quiz
      - MYSQL_USER=elms_user
      - MYSQL_PASSWORD=elms_password
      - MYSQL_ROOT_PASSWORD=root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - elms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  node:
    image: node:18-alpine
    container_name: elms_node
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    networks:
      - elms-network
    command: npm run dev

networks:
  elms-network:
    driver: bridge

volumes:
  db_data:
    driver: local
