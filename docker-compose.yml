version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elms_app
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - ./docker/php/conf.d/zz-performance.ini:/usr/local/etc/php/conf.d/zz-performance.ini:ro
      - ./docker/php-fpm.d/zz-www.conf:/usr/local/etc/php-fpm.d/zz-www.conf:ro
    depends_on:
      - db
      - mailpit
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=elms_quiz
      - DB_USERNAME=elms_user
      - DB_PASSWORD=elms_password
    networks:
      - elms-network
    expose:
      - "9000"

  nginx:
    image: nginx:1.27-alpine
    container_name: elms_nginx
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./:/app:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - elms-network

  db:
    image: mysql:8.0
    container_name: elms_db
    environment:
      - MYSQL_DATABASE=elms_quiz
      - MYSQL_USER=elms_user
      - MYSQL_PASSWORD=elms_password
      - MYSQL_ROOT_PASSWORD=root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/zz-tuning.cnf:/etc/mysql/conf.d/zz-tuning.cnf:ro
    networks:
      - elms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  node:
    image: node:18-alpine
    container_name: elms_node
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - elms-network
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci || npm install; fi; npm run dev -- --host 0.0.0.0"

  mailpit:
    image: axllent/mailpit:latest
    container_name: elms_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - elms-network

networks:
  elms-network:
    driver: bridge

volumes:
  db_data:
    driver: local
  node_modules:
    driver: local
