[www]
; Dynamic process manager tuned for local Docker development
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Optional health endpoints (can be wired in nginx later if needed)
ping.path = /fpm-ping
pm.status_path = /fpm-status
